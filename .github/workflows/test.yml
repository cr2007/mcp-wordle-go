name: Test

on:
  pull_request:
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

  docker-smoke-test:
    name: Docker image MCP smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: mcp-wordle-go:ci
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

      - name: Drive a real MCP initialize + tools/call over stdio
        run: |
          set -e
          RESPONSE=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_wordle_solution","arguments":{"date":"2023-01-01"}}}' \
            | docker run -i --rm mcp-wordle-go:ci)

          echo "$RESPONSE"

          # Line 1: initialize response. Line 2: tools/call response, whose
          # "text" field is itself a JSON string, so it needs a second jq pass.
          SERVER_NAME=$(echo "$RESPONSE" | sed -n '1p' | jq -r '.result.serverInfo.name')
          if [ "$SERVER_NAME" != "Wordle MCP" ]; then
            echo "::error::MCP initialize handshake returned unexpected serverInfo.name: $SERVER_NAME"
            exit 1
          fi

          SOLUTION=$(echo "$RESPONSE" | sed -n '2p' | jq -r '.result.content[0].text' | jq -r '.solution')
          if [ "$SOLUTION" != "whine" ]; then
            echo "::error::tools/call returned unexpected solution for 2023-01-01: '$SOLUTION' (this also exercises the image's ca-certificates bundle for the outbound HTTPS call)"
            exit 1
          fi
